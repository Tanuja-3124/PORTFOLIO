<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tanuja K · Cloud Portfolio</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    * {margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
    body {background:#0b1423;color:#f0f4fa;overflow-x:hidden;}

    #gradient-bg {
      position:fixed;top:0;left:0;width:100%;height:100%;
      background: radial-gradient(circle at 30% 40%, #0a1a3a 0%, #03070f 90%);
      z-index:-2;
    }

    .navbar {
      position:sticky;top:0;
      display:flex;justify-content:space-between;
      padding:1rem 2rem;
      background:rgba(2,12,27,0.7);
      backdrop-filter:blur(14px);
    }

    .nav-links {display:flex;gap:1.5rem;}
    .nav-links a {color:white;text-decoration:none;}

    .container {max-width:1200px;margin:auto;padding:20px;}
    section {padding:4rem 0;}

    .hero {min-height:80vh;display:flex;align-items:center;}
    .hero h1 {font-size:3rem;}

    .btn {
      background:#1f3a6b;color:white;padding:10px 25px;
      border-radius:30px;border:none;cursor:pointer;
    }

    .contact-form {
      background:rgba(8,16,36,0.6);
      padding:2rem;border-radius:20px;
    }

    .input-group {margin-bottom:1rem;}
    input,textarea {
      width:100%;padding:12px;border-radius:10px;
      border:1px solid #555;background:#000;color:white;
    }

    .error-msg {color:#ff8989;font-size:0.8rem;}

    .reveal {opacity:0;transform:translateY(30px);}
    .reveal.active {opacity:1;transform:translateY(0);transition:0.6s;}
  </style>
</head>

<body>

<div id="gradient-bg"></div>

<nav class="navbar">
  <div class="logo">Tanuja</div>
  <div class="nav-links">
    <a href="#home">Home</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<main>

<section id="home" class="hero container">
  <div>
    <h1>I'm Tanuja K</h1>
    <p>BCA Cloud Computing Student</p>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="container">
  <h2>Contact Me</h2>

  <div class="contact-form reveal">
    
    <!-- ✅ FORMSPREE CONNECTED -->
    <form id="contactForm" action="https://formspree.io/f/xkopnyoo" method="POST">

      <input type="hidden" name="_subject" value="New Contact Submission">
      <input type="hidden" name="_captcha" value="false">

      <div class="input-group">
        <input type="text" id="name" name="name" placeholder="Your Name">
        <div class="error-msg" id="nameError"></div>
      </div>

      <div class="input-group">
        <input type="email" id="email" name="email" placeholder="Email">
        <div class="error-msg" id="emailError"></div>
      </div>

      <div class="input-group">
        <textarea id="message" name="message" placeholder="Message"></textarea>
        <div class="error-msg" id="msgError"></div>
      </div>

      <button type="submit" class="btn">Send</button>
    </form>

    <div id="formSuccess"></div>
  </div>
</section>

</main>

<script>
(function(){

// Reveal animation FIX
const reveals = document.querySelectorAll('.reveal');
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('active');
    }
  });
});
reveals.forEach(el=>observer.observe(el));

// FORM LOGIC (FORM SPREE)
const contactForm = document.getElementById('contactForm');
const nameInput = document.getElementById('name');
const emailInput = document.getElementById('email');
const msgInput = document.getElementById('message');

const nameErr = document.getElementById('nameError');
const emailErr = document.getElementById('emailError');
const msgErr = document.getElementById('msgError');
const formSuccess = document.getElementById('formSuccess');

contactForm.addEventListener('submit', async (e)=>{
  e.preventDefault();

  let valid=true;

  nameErr.textContent='';
  emailErr.textContent='';
  msgErr.textContent='';
  formSuccess.innerHTML='';

  if(nameInput.value.trim()===''){
    nameErr.textContent='Name required';
    valid=false;
  }

  if(emailInput.value.trim()===''){
    emailErr.textContent='Email required';
    valid=false;
  }

  if(msgInput.value.trim()===''){
    msgErr.textContent='Message required';
    valid=false;
  }

  if(!valid){
    formSuccess.innerHTML='⚠️ Fix errors';
    return;
  }

  try{
    const res=await fetch(contactForm.action,{
      method:"POST",
      body:new FormData(contactForm),
      headers:{'Accept':'application/json'}
    });

    if(res.ok){
      formSuccess.innerHTML='✅ Message sent!';
      contactForm.reset();
    }else{
      formSuccess.innerHTML='❌ Failed';
    }
  }catch{
    formSuccess.innerHTML='⚠️ Error';
  }
});

})();
</script>

</body>
</html>
